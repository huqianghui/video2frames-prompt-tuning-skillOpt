# SkillOpt config for the video2frames frame-description task.
#
# This YAML is the single source of truth for MODEL SELECTION (all three
# roles: target, optimizer, judge). `.env` holds only credentials and
# connection strings (Azure endpoint/key/api-version, Blob settings) — see
# "Model configuration" in README.md.
# Unmapped env.* keys pass through to Video2FramesAdapter.__init__ kwargs.

model:
  # optimizer: the analyst/reflection model that proposes skill edits.
  optimizer: gpt-5.4
  # target: the tuned model that runs the rollouts. Fixed to the customer's
  # production deployment — changing it breaks comparability with recorded
  # baselines.
  target: gpt-4.1-mini
  azure_openai_auth_mode: api_key

train:
  num_epochs: 4
  batch_size: 8
  accumulation: 1
  seed: 42

gradient:
  minibatch_size: 4
  merge_batch_size: 8
  analyst_workers: 4
  failure_only: false

optimizer:
  learning_rate: 3
  lr_scheduler: cosine

evaluation:
  use_gate: true
  gate_metric: soft
  sel_env_num: 24
  test_env_num: 30
  eval_test: true

env:
  name: video2frames
  # judge: the LLM that grades generated descriptions (evaluator.py).
  judge_model: gpt-5.4-mini
  skill_init: video2frames_env/skills/initial.md
  split_dir: data/splits
  workers: 12
  exec_timeout: 180
  max_completion_tokens: 4096
  hard_threshold: 0.8
  use_base64: false
